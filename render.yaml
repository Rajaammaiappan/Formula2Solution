# Render Blueprint — deploy with "New > Blueprint" pointing at this repo
services:
  - type: web
    name: formula2solution
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false          # e.g. libsql://formula2solution-yourorg.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false          # turso db tokens create <db-name>
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.3
