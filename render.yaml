# Render Blueprint — deploy with "New > Blueprint" pointing at this repo
services:
  - type: web
    name: formula2solution
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false          # e.g. libsql://formula2solution-yourorg.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false          # turso db tokens create <db-name>
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: SMTP_USER
        sync: false          # your Gmail address (sender)
      - key: SMTP_PASS
        sync: false          # Gmail App Password (16 chars)
      - key: NOTIFY_EMAIL_TO
        sync: false          # where lead alerts go (can equal SMTP_USER)
      - key: CALLMEBOT_PHONE
        sync: false          # optional: your WhatsApp number, e.g. +9198xxxxxxxx
      - key: CALLMEBOT_APIKEY
        sync: false          # optional: CallMeBot API key
      - key: PYTHON_VERSION
        value: 3.12.3
